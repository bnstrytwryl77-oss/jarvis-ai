<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS - Mainframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- מסך טעינה ראשוני -->
    <div id="boot-screen">
        <button class="boot-btn" id="init-btn">INITIALIZE MAINFRAME OS</button>
    </div>

    <!-- ממשק ה-HUD הראשי -->
    <div id="hud-container">
        <div class="hud-header">
            <div>SYS_STATUS: <span id="hud-status-text">STANDBY</span></div>
            <div id="hud-title">JARVIS: DORMANT</div>
            <div id="battery-status">BATTERY: --%</div>
        </div>
        
        <div class="main-layout">
            <!-- פאנל משימות שמאלי חכם -->
            <div class="side-panel" id="task-panel">
                <h3>[ACTIVE_DIRECTIVES]</h3>
                <ul id="task-list">
                    <li>No pending directives.</li>
                </ul>
            </div>

            <!-- כור ארק מרכזי -->
            <div class="arc-zone">
                <div class="arc-reactor">
                    <div class="arc-mid">
                        <div class="arc-inner">
                            <div class="arc-core"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- תיבת כתוביות (מה שג'ארוויס אומר) -->
        <div class="subtitle-panel" id="jarvis-speech">
            Awaiting biometric uplink...
        </div>

        <!-- מסוף דיאגנוסטיקה ולוגים (שומר שגיאות בבטחה) -->
        <div class="diagnostics-terminal" id="system-terminal">
            <div class="log-entry" style="color: #666;">[SYSTEM] Modular architecture deployed successfully.</div>
        </div>

        <button class="config-btn" id="key-btn">RE-CONFIG API KEY</button>
    </div>

    <!-- טעינת הסקריפטים בסדר נכון -->
    <script src="ai-core.js"></script>
    <script src="jarvis.js"></script>
</body>
</html>
