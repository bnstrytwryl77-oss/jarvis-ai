<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Integrated Cloud HUD</title>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-blue: #0072ff;
            --neon-red: #ff0055;
            --neon-dark-red: #990022;
            --dark-bg: #02050d;
            --theme-color: var(--neon-red);
            --theme-glow: var(--neon-dark-red);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--theme-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: color 0.5s ease, background-image 0.5s ease;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 0, 85, 0.05) 0%, transparent 70%);
        }

        body.active {
            --theme-color: var(--neon-cyan);
            --theme-glow: var(--neon-blue);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 114, 255, 0.1) 0%, transparent 70%);
        }

        #boot-screen {
            position: absolute;
            display: flex;
            background: var(--dark-bg);
            width: 100%;
            height: 100%;
            z-index: 10;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .boot-btn {
            background: transparent;
            color: var(--theme-color);
            border: 2px solid var(--theme-color);
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--theme-glow);
            text-shadow: 0 0 5px var(--theme-color);
            transition: all 0.3s ease;
        }

        #hud-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }

        .arc-reactor {
            position: relative;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px dashed var(--theme-color);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate 25s linear infinite;
            box-shadow: 0 0 30px var(--theme-glow);
            margin-bottom: 40px;
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .arc-inner {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid var(--theme-color);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotateReverse 12s linear infinite;
            transition: border-color 0.5s ease;
        }

        .arc-core {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, var(--theme-color) 60%, var(--theme-glow) 100%);
            box-shadow: 0 0 30px var(--theme-color);
            animation: pulse 2s infinite ease-in-out;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 6px;
            text-shadow: 0 0 10px var(--theme-color);
            margin: 0 0 10px 0;
            transition: text-shadow 0.5s ease;
        }

        #status {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: bold;
        }

        #console-log {
            width: 80%;
            height: 120px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--theme-color);
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            color: #fff;
            text-align: center;
            overflow-y: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: border-color 0.5s ease;
        }

        .config-btn {
            margin-top: 15px;
            background: transparent;
            color: #666;
            border: 1px solid #446;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .config-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotateReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 40px var(--theme-color); }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <button class="boot-btn" id="init-btn">INITIALIZE CLOUD SYSTEM</button>
    </div>

    <div id="hud-container">
        <h1 id="title">SYSTEM DORMANT</h1>
        <div id="status">MODE: STANDBY</div>
        
        <div class="arc-reactor">
            <div class="arc-inner">
                <div class="arc-core"></div>
            </div>
        </div>

        <div id="console-log">Say "Jarvis, wake up" to initialize control...</div>
        <button class="config-btn" id="key-btn">Set Gemini API Key</button>
    </div>

    <script>
        const initBtn = document.getElementById('init-btn');
        const bootScreen = document.getElementById('boot-screen');
        const hudContainer = document.getElementById('hud-container');
        const statusDiv = document.getElementById('status');
        const consoleLog = document.getElementById('console-log');
        const titleH1 = document.getElementById('title');
        const keyBtn = document.getElementById('key-btn');

        let recognition;
        let isAsleep = true;
        let geminiKey = localStorage.getItem('gemini_api_key') || "";

        // כפתור הפעלה ראשוני
        initBtn.addEventListener('click', () => {
            bootScreen.style.opacity = '0';
            setTimeout(() => {
                bootScreen.style.display = 'none';
                hudContainer.style.display = 'flex';
                checkApiKey();
                startVoiceEngine();
            }, 800);
        });

        // הגדרת מפתח ה-API ושמירתו בדפדפן בלבד
        keyBtn.addEventListener('click', () => {
            let key = prompt("Please enter your Gemini API Key:");
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                geminiKey = key;
                consoleLog.innerHTML = "<span style='color: green;'>[SUCCESS] API Key updated successfully!</span>";
                alert("API Key saved locally and securely!");
            }
        });

        function checkApiKey() {
            if(!geminiKey) {
                consoleLog.innerHTML = "<span style='color: var(--neon-red);'>[WARNING] AI Brain offline. Click 'Set Gemini API Key' below to make Jarvis smart.</span>";
            }
        }

        // מנוע זיהוי הדיבור של גוגל כרום
        function startVoiceEngine() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                consoleLog.innerText = "Error: Browser speech recognition not supported.";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[event.resultIndex][0].transcript.toLowerCase().trim();
                console.log("Heard:", transcript);

                if (isAsleep) {
                    // מצב שינה אדום - מגיב רק למילת התעוררות
                    if (transcript.includes("jarvis wake up") || transcript.includes("wake up")) {
                        wakeUp();
                    } else {
                        consoleLog.innerHTML = `<span style='color: var(--neon-red);'>[LOCKED] System dormant. Say "Jarvis, wake up" to unlock.</span>`;
                    }
                } else {
                    // מצב פעיל כחול - מקשיב לכל פקודה ישירות בלי לחזור על השם
                    if (transcript.includes("go to sleep") || transcript.includes("system sleep")) {
                        goToSleep();
                    } else {
                        consoleLog.innerHTML = `<span>Command received: "${transcript}"</span>`;
                        processLiveCommand(transcript);
                    }
                }
            };

            // דואג שהמערכת תישאר דלוקה ותקשיב תמיד בלופ
            recognition.onend = () => { recognition.start(); }; 
            recognition.start();
        }

        // מעבר למצב פעיל (כחול)
        function wakeUp() {
            isAsleep = false;
            document.body.classList.add('active');
            titleH1.innerText = "JARVIS ONLINE";
            statusDiv.innerText = "MODE: ACTIVE / AWAITING INSTRUCTIONS";
            consoleLog.innerHTML = "<span style='color: var(--neon-cyan);'>[SYSTEM] Systems integrated. Ready for input, sir.</span>";
            speak("Systems operational. Welcome back, sir.");
        }

        // חזרה למצב שינה (אדום)
        function goToSleep() {
            isAsleep = true;
            document.body.classList.remove('active');
            titleH1.innerText = "SYSTEM DORMANT";
            statusDiv.innerText = "MODE: STANDBY";
            consoleLog.innerHTML = "Say 'Jarvis, wake up' to initialize control...";
            speak("Understood, entering standby mode.");
        }

        // עיבוד הפקודות החיות של הדפדפן וה-AI
        function processLiveCommand(command) {
            // פקודות דפדפן מהירות
            if (command.includes("open youtube")) {
                speak("Opening YouTube, sir.");
                window.open("https://www.youtube.com", "_blank");
                return;
            }
            if (command.includes("open google")) {
                speak("Opening Google.");
                window.open("https://www.google.com", "_blank");
                return;
            }
            if (command.includes("open tiktok")) {
                speak("Opening TikTok.");
                window.open("https://www.tiktok.com", "_blank");
                return;
            }
            if (command.includes("search for")) {
                let query = command.replace("search for", "").trim();
                speak(`Searching Google for ${query}`);
                window.open(`https://www.google.com/search?q=${query}`, "_blank");
                return;
            }
            if (command.includes("time")) {
                const now = new Date();
                speak(`The time is ${now.getHours()} ${now.getMinutes().toString().padStart(2, '0')}.`);
                return;
            }

            // חיבור ישיר לבינה המלאכותית (Gemini API) במידה ויש מפתח
            if (geminiKey) {
                askGeminiAI(command);
            } else {
                speak("I heard you, but my AI brain key is missing. Please configuration it below, sir.");
            }
        }

        // פנייה ישירה ל-AI
        function askGeminiAI(promptText) {
            statusDiv.innerText = "MODE: THINKING...";
            consoleLog.innerHTML = "[JARVIS] Processing uplink with mainframe...";

            // פקודות מערכת מובנות שמכריחות את ה-AI להתנהג כמו ג'ארוויס
            const systemPrompt = "You are J.A.R.V.I.S., the highly sophisticated, witty, and loyal AI assistant from Iron Man. Keep your answers concise, cool, advanced, and always address the user as 'sir'. Answer this command: " + promptText;

            fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt }] }]
                })
            })
            .then(res => res.json())
            .then(data => {
                let aiResponse = data.candidates[0].content.parts[0].text;
                speak(aiResponse);
            })
            .catch(err => {
                console.error(err);
                speak("Forgive me sir, I encountered an error connecting to my core network.");
                statusDiv.innerText = "MODE: ACTIVE / AWAITING INSTRUCTIONS";
            });
        }

        // מנוע הדיבור של ג'ארוויס
        function speak(text) {
            recognition.stop(); // עוצר את ההאזנה לרגע כדי שלא ישמע את עצמו מדבר
            statusDiv.innerText = "MODE: RESPONDING";
            consoleLog.innerHTML = `<span style='color: var(--neon-cyan);'>[JARVIS]: ${text}</span>`;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.05; // מהירות דיבור טבעית ומגניבה
            utterance.pitch = 0.85; // טון מעט נמוך ורובוטי-יוקרתי

            utterance.onend = () => { 
                statusDiv.innerText = "MODE: ACTIVE / AWAITING INSTRUCTIONS";
                recognition.start(); // מחזיר את ההאזנה מיד כשסיים לדבר
            };
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
